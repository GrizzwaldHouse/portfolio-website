name: Build Check

on:
  push:
    branches: [main]

jobs:
  build:
    name: Verify Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production build
        id: build
        run: npm run build

      - name: Build succeeded
        if: success()
        run: echo "Build completed successfully for commit ${{ github.sha }}"

      - name: Build failed
        if: failure()
        run: |
          echo "Build FAILED for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Check the 'Run production build' step above for error details."

# Deployment notes:
#
# Vercel:
#   Vercel is connected to this repo and auto-deploys on push to main.
#   This workflow serves as an early warning -- if the build fails here,
#   the Vercel deploy will also fail.
#
# Netlify:
#   Netlify is configured as a secondary deployment target.
#   If using Netlify CLI or Git-based deploys, ensure netlify.toml
#   is present in the repo root with the correct build settings.
