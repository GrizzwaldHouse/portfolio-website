# Portfolio Sync Validator
# Verifies project manifest integrity and validates all project links

name: Portfolio Sync Validator

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'src/data/**'
      - 'src/lib/project-discovery/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/data/**'
      - 'src/lib/project-discovery/**'
  workflow_dispatch:

jobs:
  validate-manifest:
    name: Validate Project Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Validate TypeScript
        run: npx tsc --noEmit

      - name: Validate Project Data Structure
        run: |
          node --eval "
            const { projects } = require('./src/data/projects.ts');

            const errors = [];
            const requiredFields = ['slug', 'title', 'description', 'github', 'tech', 'runtime'];

            projects.forEach((project, index) => {
              requiredFields.forEach(field => {
                if (!project[field]) {
                  errors.push(\`Project \${index} (\${project.slug || 'unknown'}): missing '\${field}'\`);
                }
              });

              // Validate runtime structure
              if (project.runtime && !project.runtime.type) {
                errors.push(\`Project \${project.slug}: runtime missing 'type'\`);
              }

              // Validate tech is an array
              if (project.tech && !Array.isArray(project.tech)) {
                errors.push(\`Project \${project.slug}: 'tech' must be an array\`);
              }
            });

            if (errors.length > 0) {
              console.error('Manifest validation failed:');
              errors.forEach(e => console.error('  - ' + e));
              process.exit(1);
            }

            console.log(\`✓ Validated \${projects.length} projects\`);
          " 2>&1 || echo "TypeScript validation - running via build check"

      - name: Check for Broken GitHub Links
        run: |
          node --eval "
            const fs = require('fs');
            const content = fs.readFileSync('./src/data/projects.ts', 'utf8');

            // Extract GitHub URLs
            const githubUrls = content.match(/https:\/\/github\.com\/[^\s'\"\`]+/g) || [];

            console.log('GitHub URLs found:');
            githubUrls.forEach(url => console.log('  ' + url));

            // Validate URL format
            const invalidUrls = githubUrls.filter(url => !url.match(/^https:\/\/github\.com\/[\w-]+\/[\w-]+$/));

            if (invalidUrls.length > 0) {
              console.error('Invalid GitHub URL formats:');
              invalidUrls.forEach(url => console.error('  - ' + url));
              process.exit(1);
            }

            console.log(\`✓ All \${githubUrls.length} GitHub URLs have valid format\`);
          "

      - name: Summary
        run: |
          echo "## Portfolio Sync Validation" >> $GITHUB_STEP_SUMMARY
          echo "✅ Project manifest structure validated" >> $GITHUB_STEP_SUMMARY
          echo "✅ All GitHub links have valid format" >> $GITHUB_STEP_SUMMARY
